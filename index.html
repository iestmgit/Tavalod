<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نمایشگر حرفه‌ای تصویر</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 20% 30%, #14141e, #0a0a12);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding: 16px;
    }

    .viewer {
      width: 100%;
      max-width: 720px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 40px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.8);
      padding: 24px 24px 28px;
      text-align: center;
      transition: all 0.3s;
    }

    /* کادر تصویر با افکت نور */
    .image-wrapper {
      position: relative;
      border-radius: 28px;
      overflow: hidden;
      background: #00000030;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      margin-bottom: 20px;
      aspect-ratio: 4 / 3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      transition: transform 0.35s cubic-bezier(0.2, 0.9, 0.3, 1.2), filter 0.3s;
      filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.5));
      user-select: none;
      -webkit-user-drag: none;
    }

    /* عنوان و اطلاعات */
    .file-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 6px 12px 6px;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
    }
    .file-info span:first-child {
      font-weight: 500;
      color: #e0e0f0;
    }
    .file-info span:last-child {
      background: rgba(255, 255, 255, 0.04);
      padding: 4px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      letter-spacing: 0.3px;
    }

    /* کنترل‌ها */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .controls button {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 50%;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.3rem;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(4px);
    }
    .controls button:hover {
      background: rgba(255, 255, 255, 0.10);
      transform: scale(1.08);
      border-color: rgba(100, 200, 255, 0.3);
    }
    .controls button:active {
      transform: scale(0.92);
    }
    .controls button svg {
      width: 22px;
      height: 22px;
      fill: rgba(255, 255, 255, 0.7);
      transition: fill 0.2s;
    }
    .controls button:hover svg {
      fill: #fff;
    }

    /* دکمه اصلی (ریست) */
    .controls .btn-reset {
      background: linear-gradient(145deg, #3a3a5a, #1e1e32);
      border-color: rgba(255, 255, 255, 0.08);
      width: 56px;
      height: 56px;
    }
    .controls .btn-reset svg {
      fill: #aab;
    }

    /* اسلایدر زوم (اختیاری) */
    .zoom-slider {
      margin-top: 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 10px;
    }
    .zoom-slider span {
      color: rgba(255, 255, 255, 0.3);
      font-size: 0.75rem;
      min-width: 36px;
    }
    .zoom-slider input[type="range"] {
      flex: 1;
    }

    /* استایل range */
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      background: transparent;
      width: 100%;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-runnable-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6ec8ff, #7a5cff);
      margin-top: -5px;
      box-shadow: 0 0 20px rgba(100, 180, 255, 0.3);
      border: 2px solid rgba(255, 255, 255, 0.15);
      transition: 0.15s;
    }
    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.15);
    }
    input[type="range"]::-moz-range-track {
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      border: 0;
    }
    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6ec8ff, #7a5cff);
      border: 2px solid rgba(255, 255, 255, 0.15);
      cursor: pointer;
    }

    /* انیمیشن ورود */
    .viewer {
      animation: fadeUp 0.7s ease both;
    }
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @media (max-width: 500px) {
      .viewer {
        padding: 16px;
        border-radius: 28px;
      }
      .controls button {
        width: 42px;
        height: 42px;
      }
      .controls .btn-reset {
        width: 50px;
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="viewer">

    <!-- محفظه تصویر -->
    <div class="image-wrapper" id="imageWrapper">
      <img id="mainImage" src="۲۰۲۳۰۳۰۴_۱۵۴۷۰۷.jpg" alt="تصویر" />
    </div>

    <!-- اطلاعات فایل -->
    <div class="file-info">
      <span>🖼️ ۲۰۲۳۰۳۰۴_۱۵۴۷۰۷.jpg</span>
      <span id="dimensionInfo">–</span>
    </div>

    <!-- کنترل‌ها -->
    <div class="controls">
      <button id="zoomOutBtn" title="کوچک‌نمایی">
        <svg viewBox="0 0 24 24"><path d="M19 13H5v-2h14v2z"/></svg>
      </button>
      <button id="resetBtn" class="btn-reset" title="بازنشانی (ریست)">
        <svg viewBox="0 0 24 24"><path d="M12 4V1L8 5l4 4V6c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>
      </button>
      <button id="zoomInBtn" title="بزرگ‌نمایی">
        <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      </button>
      <button id="rotateBtn" title="چرخش ۹۰ درجه">
        <svg viewBox="0 0 24 24"><path d="M15.55 5.55L11 1v3.07C7.06 4.56 4 7.92 4 12s3.06 7.44 7 7.93v-2.02c-2.84-.48-5-2.94-5-5.91s2.16-5.43 5-5.91V1l4.55 4.55z"/></svg>
      </button>
      <button id="fullscreenBtn" title="تمام‌صفحه">
        <svg viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
      </button>
    </div>

    <!-- اسلایدر زوم -->
    <div class="zoom-slider">
      <span>🔍</span>
      <input type="range" id="zoomSlider" min="30" max="200" value="100" step="1" />
      <span id="zoomPercent">۱۰۰٪</span>
    </div>
  </div>

  <script>
    (function() {
      const img = document.getElementById('mainImage');
      const wrapper = document.getElementById('imageWrapper');
      const zoomIn = document.getElementById('zoomInBtn');
      const zoomOut = document.getElementById('zoomOutBtn');
      const resetBtn = document.getElementById('resetBtn');
      const rotateBtn = document.getElementById('rotateBtn');
      const fullscreenBtn = document.getElementById('fullscreenBtn');
      const zoomSlider = document.getElementById('zoomSlider');
      const zoomPercent = document.getElementById('zoomPercent');
      const dimensionInfo = document.getElementById('dimensionInfo');

      let currentScale = 1;
      let currentRotation = 0;

      // نمایش ابعاد تصویر بعد از بارگذاری
      img.onload = function() {
        dimensionInfo.textContent = `${img.naturalWidth} × ${img.naturalHeight}`;
      };
      if (img.complete) {
        dimensionInfo.textContent = `${img.naturalWidth} × ${img.naturalHeight}`;
      }

      // به‌روزرسانی transform
      function updateTransform() {
        img.style.transform = `scale(${currentScale}) rotate(${currentRotation}deg)`;
        zoomSlider.value = Math.round(currentScale * 100);
        zoomPercent.textContent = `${Math.round(currentScale * 100)}٪`;
      }

      // بزرگ‌نمایی
      function zoomInStep() {
        currentScale = Math.min(2, currentScale + 0.1);
        updateTransform();
      }
      // کوچک‌نمایی
      function zoomOutStep() {
        currentScale = Math.max(0.3, currentScale - 0.1);
        updateTransform();
      }

      // ریست
      function resetAll() {
        currentScale = 1;
        currentRotation = 0;
        updateTransform();
      }

      // چرخش
      function rotateStep() {
        currentRotation = (currentRotation + 90) % 360;
        updateTransform();
      }

      // تمام‌صفحه (برای کل صفحه)
      function toggleFullscreen() {
        if (!document.fullscreenElement) {
          document.documentElement.requestFullscreen().catch(() => {});
        } else {
          if (document.exitFullscreen) {
            document.exitFullscreen();
          }
        }
      }

      // رویدادها
      zoomIn.addEventListener('click', zoomInStep);
      zoomOut.addEventListener('click', zoomOutStep);
      resetBtn.addEventListener('click', resetAll);
      rotateBtn.addEventListener('click', rotateStep);
      fullscreenBtn.addEventListener('click', toggleFullscreen);

      // اسلایدر زوم
      zoomSlider.addEventListener('input', function() {
        const val = parseFloat(this.value);
        currentScale = val / 100;
        updateTransform();
      });

      // کیبورد (Z = زوم, X = ریست, R = چرخش, F = تمام‌صفحه)
      document.addEventListener('keydown', (e) => {
        if (e.target.tagName === 'INPUT') return;
        switch (e.key.toLowerCase()) {
          case 'z': e.preventDefault(); zoomInStep(); break;
          case 'x': e.preventDefault(); zoomOutStep(); break;
          case 'r': e.preventDefault(); rotateStep(); break;
          case 'f': e.preventDefault(); toggleFullscreen(); break;
          case ' ':
            e.preventDefault();
            resetAll();
            break;
        }
      });

      // مقدار اولیه
      updateTransform();

      // اگر تصویر پیدا نشد، پیام خطا (اختیاری)
      img.onerror = function() {
        dimensionInfo.textContent = '❌ فایل پیدا نشد!';
      };
    })();
  </script>
</body>
</html>
