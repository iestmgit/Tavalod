<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎂 تولدت مبارک عمو هادی!</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazir+Matn:wght@300;700;900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Vazir Matn', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a12;
      overflow: hidden;
      cursor: default;
      margin: 0;
    }

    /* ===== پس‌زمینه ساده ===== */
    .bg-layer {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse at 20% 50%, rgba(180, 90, 30, 0.2) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(200, 150, 50, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(100, 50, 150, 0.1) 0%, transparent 50%),
        #0a0a12;
      animation: bgShift 20s ease-in-out infinite alternate;
      will-change: transform;
    }
    @keyframes bgShift {
      0% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.08) rotate(2deg); }
    }

    /* ===== کانواس ذرات (بهینه شده) ===== */
    #particles-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      will-change: transform;
    }

    /* ===== کارت اصلی (بهینه) ===== */
    .card {
      position: relative;
      z-index: 10;
      max-width: 780px;
      width: 100%;
      margin: 20px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px) saturate(1.2);
      -webkit-backdrop-filter: blur(20px) saturate(1.2);
      border-radius: 80px 16px 80px 16px;
      padding: 40px 30px 48px;
      box-shadow:
        0 40px 80px rgba(0, 0, 0, 0.7),
        0 0 0 1px rgba(255, 215, 0, 0.12),
        inset 0 0 60px rgba(255, 215, 0, 0.02);
      border: 1px solid rgba(255, 215, 0, 0.1);
      text-align: center;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
      animation: cardFloat 7s ease-in-out infinite;
      will-change: transform;
      contain: layout style paint;
    }
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    .card:hover {
      transform: translateY(-6px) scale(1.008);
      box-shadow:
        0 60px 120px rgba(0, 0, 0, 0.8),
        0 0 0 2px rgba(255, 215, 0, 0.3);
    }

    /* هاله‌ی طلایی (ساده‌تر) */
    .card::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 82px 18px 82px 18px;
      background: linear-gradient(135deg, #f9d976, #f39c12, #f1c40f, #e67e22);
      background-size: 300% 300%;
      z-index: -1;
      filter: blur(16px);
      opacity: 0.4;
      animation: goldPulse 8s ease-in-out infinite;
      will-change: transform, opacity;
    }
    @keyframes goldPulse {
      0% { background-position: 0% 50%; opacity: 0.3; }
      50% { background-position: 100% 50%; opacity: 0.6; }
      100% { background-position: 0% 50%; opacity: 0.3; }
    }

    /* ===== عنوان ===== */
    .greeting {
      font-size: 2.6rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ffe680, #ffb347, #ff8c00);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmerGold 5s ease-in-out infinite;
      letter-spacing: 3px;
      margin-bottom: 4px;
      will-change: background-position;
    }
    @keyframes shimmerGold {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    /* ===== اسم ===== */
    .name-wrapper {
      position: relative;
      display: inline-block;
      margin: 4px 0 2px;
    }
    .name {
      font-size: 5rem;
      font-weight: 900;
      color: #fff;
      letter-spacing: 12px;
      text-shadow: 0 0 20px rgba(241, 196, 15, 0.4), 0 0 50px rgba(230, 126, 34, 0.3);
      animation: neonWave 3.2s ease-in-out infinite alternate;
      will-change: transform, text-shadow;
    }
    @keyframes neonWave {
      0% { text-shadow: 0 0 15px #f1c40f, 0 0 40px #e67e22, 0 0 70px #f39c12; transform: scale(1); }
      100% { text-shadow: 0 0 30px #ffd700, 0 0 70px #ff8c00, 0 0 110px #ffa500; transform: scale(1.02); }
    }
    .name-underline {
      width: 60%;
      height: 3px;
      margin: 6px auto 0;
      background: linear-gradient(90deg, transparent, #f1c40f, #e67e22, transparent);
      border-radius: 10px;
      animation: underlinePulse 2.4s ease-in-out infinite;
      will-change: transform, opacity;
    }
    @keyframes underlinePulse {
      0%, 100% { transform: scaleX(0.8); opacity: 0.5; }
      50% { transform: scaleX(1.1); opacity: 1; }
    }

    /* ===== برچسب ===== */
    .age-badge {
      display: inline-block;
      background: rgba(255, 215, 0, 0.08);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 215, 0, 0.25);
      padding: 4px 28px;
      border-radius: 60px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #ffeaa7;
      letter-spacing: 2px;
      margin: 8px 0 14px;
    }

    /* ===== ایموجی‌ها ===== */
    .emoji-row {
      font-size: 3.4rem;
      letter-spacing: 16px;
      margin: 6px 0 14px;
      animation: emojiDance 2.6s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes emojiDance {
      0%, 100% { transform: rotate(-3deg) scale(1); }
      50% { transform: rotate(3deg) scale(1.12); }
    }

    /* ===== پیام ===== */
    .message-box {
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 8px 0 18px;
    }
    .message {
      font-size: 1.3rem;
      line-height: 2.2rem;
      color: #f0e6d3;
      font-weight: 300;
      background: rgba(0, 0, 0, 0.3);
      padding: 18px 24px;
      border-radius: 50px 10px 50px 10px;
      border-right: 4px solid #f1c40f;
      border-left: 4px solid #f39c12;
      backdrop-filter: blur(4px);
      width: 100%;
      text-align: center;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: box-shadow 0.4s, border-color 0.4s;
    }
    .message .hl {
      color: #ffd700;
      font-weight: 700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
    }
    .cursor-blink {
      display: inline-block;
      width: 3px;
      height: 1.6rem;
      background: #ffd700;
      margin-right: 3px;
      vertical-align: middle;
      animation: blink 0.9s step-end infinite;
      border-radius: 2px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ===== دکمه ===== */
    .btn-gift {
      position: relative;
      display: inline-block;
      padding: 18px 54px;
      background: linear-gradient(145deg, #f1c40f, #e67e22);
      border: none;
      border-radius: 60px;
      color: #0b0e1a;
      font-size: 1.6rem;
      font-weight: 900;
      font-family: 'Vazir Matn', sans-serif;
      cursor: pointer;
      box-shadow: 0 12px 35px rgba(241, 196, 15, 0.35);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 2px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      margin-top: 6px;
      overflow: hidden;
      user-select: none;
      will-change: transform, box-shadow;
    }
    .btn-gift:hover {
      transform: scale(1.06) translateY(-2px);
      box-shadow: 0 20px 60px #f39c12, 0 0 80px #f1c40f;
      background: linear-gradient(145deg, #ffe066, #f39c12);
      color: #000;
    }
    .btn-gift:active {
      transform: scale(0.94);
    }

    /* ===== پانوشت ===== */
    .footer-note {
      margin-top: 28px;
      color: rgba(255, 215, 0, 0.18);
      font-size: 0.8rem;
      letter-spacing: 3px;
      border-top: 1px solid rgba(255, 215, 0, 0.05);
      padding-top: 20px;
    }

    /* ===== کانفتی ===== */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      animation: confettiFall linear forwards;
      will-change: transform, opacity;
    }
    @keyframes confettiFall {
      0% {
        transform: translateY(-10vh) rotate(0deg) scale(0.7);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(720deg) scale(0.15);
        opacity: 0.1;
      }
    }

    /* ===== ریسپانسیو ===== */
    @media (max-width: 640px) {
      .card { padding: 28px 14px 36px; border-radius: 50px 10px 50px 10px; margin: 12px; }
      .greeting { font-size: 2rem; }
      .name { font-size: 3.2rem; letter-spacing: 6px; }
      .message { font-size: 1rem; padding: 12px; line-height: 1.8rem; }
      .btn-gift { font-size: 1.2rem; padding: 14px 28px; }
      .emoji-row { font-size: 2.6rem; letter-spacing: 12px; }
      .age-badge { font-size: 0.95rem; padding: 4px 16px; }
      .footer-note { font-size: 0.7rem; }
    }
    @media (max-width: 400px) {
      .name { font-size: 2.4rem; letter-spacing: 4px; }
      .greeting { font-size: 1.6rem; }
      .btn-gift { font-size: 1rem; padding: 12px 20px; }
    }

    /* ===== fade-in اولیه ===== */
    .fade-in {
      animation: fadeUp 0.9s ease forwards;
      opacity: 0;
      transform: translateY(24px);
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .d1 { animation-delay: 0.1s; }
    .d2 { animation-delay: 0.25s; }
    .d3 { animation-delay: 0.45s; }
    .d4 { animation-delay: 0.65s; }
    .d5 { animation-delay: 0.85s; }
  </style>
</head>
<body>

  <div class="bg-layer"></div>
  <canvas id="particles-canvas"></canvas>

  <div class="card fade-in d1">
    <div class="greeting fade-in d2">🎂 تولدت مبارک 🎂</div>

    <div class="name-wrapper fade-in d3">
      <div class="name">عمو هادی</div>
      <div class="name-underline"></div>
    </div>

    <div class="age-badge fade-in d3">✨ امروز روز خاص توست ✨</div>
    <div class="emoji-row fade-in d3">🎁 🥳 🎈 🎉 🎊</div>

    <div class="message-box fade-in d4">
      <div class="message" id="typewriterMessage">
        <span class="hl">❤️ عمو هادی عزیز ❤️</span><br />
        بهترین‌ها را برایت آرزو میکنم.<br />
        روزت پر از <span class="hl">شادی، عشق و موفقیت</span> 🌟
        <span class="cursor-blink"></span>
      </div>
    </div>

    <button class="btn-gift fade-in d5" id="fireConfettiBtn">🎁 هدیه‌ی مخصوص 🎁</button>
    <div class="footer-note fade-in d5">★ با عشق از طرف خانواده ★</div>
  </div>

  <script>
    (function() {
      'use strict';

      // ============================================================
      // 1. ذرات پس‌زمینه (بهینه، تعداد کمتر)
      // ============================================================
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      let particles = [];

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resize);
      resize();

      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * W;
          this.y = Math.random() * H;
          this.r = Math.random() * 2 + 0.8;
          this.dx = (Math.random() - 0.5) * 0.15;
          this.dy = (Math.random() - 0.5) * 0.15;
          this.alpha = Math.random() * 0.4 + 0.2;
          this.hue = 38 + Math.random() * 25;
        }
        update() {
          this.x += this.dx;
          this.y += this.dy;
          if (this.x < 0 || this.x > W) this.dx *= -1;
          if (this.y < 0 || this.y > H) this.dy *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${this.hue}, 80%, 70%, ${this.alpha})`;
          ctx.shadowColor = '#ffd700';
          ctx.shadowBlur = 10;
          ctx.fill();
        }
      }

      // کاهش تعداد ذرات برای روان‌تر شدن
      for (let i = 0; i < 90; i++) particles.push(new Particle());

      function animateParticles() {
        ctx.clearRect(0, 0, W, H);
        for (let p of particles) {
          p.update();
          p.draw();
        }
        requestAnimationFrame(animateParticles);
      }
      animateParticles();

      // ============================================================
      // 2. کانفتی (تعداد کمتر و سبک‌تر)
      // ============================================================
      function createConfetti(count = 70) {
        const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#ffe66d', '#ff9ff3', '#f368e0', '#ff9f43', '#00d2d3', '#1dd1a1', '#feca57', '#a29bfe', '#fd79a8'];
        for (let i = 0; i < count; i++) {
          const el = document.createElement('div');
          el.className = 'confetti-piece';
          const color = colors[Math.floor(Math.random() * colors.length)];
          const size = Math.random() * 12 + 6;
          const left = Math.random() * 100;
          const duration = Math.random() * 2 + 2.5;
          const delay = Math.random() * 0.8;
          const rotate = Math.random() * 360;
          const isCircle = Math.random() > 0.6;

          el.style.width = size + 'px';
          el.style.height = (isCircle ? size : size * (0.5 + Math.random() * 0.5)) + 'px';
          el.style.background = color;
          el.style.left = left + '%';
          el.style.top = '-10px';
          el.style.borderRadius = isCircle ? '50%' : '2px';
          el.style.animationDuration = duration + 's';
          el.style.animationDelay = delay + 's';
          el.style.transform = `rotate(${rotate}deg)`;
          el.style.boxShadow = `0 0 12px ${color}60`;

          document.body.appendChild(el);
          setTimeout(() => { if (el.parentNode) el.remove(); }, (duration + delay) * 1000 + 200);
        }
      }

      // ============================================================
      // 3. دکمه و رویدادها
      // ============================================================
      const btn = document.getElementById('fireConfettiBtn');

      btn.addEventListener('click', function(e) {
        // افکت فشرده شدن
        this.style.transform = 'scale(0.92)';
        setTimeout(() => { this.style.transform = ''; }, 150);

        // کانفتی در سه موج
        createConfetti(90);
        setTimeout(() => createConfetti(50), 250);
        setTimeout(() => createConfetti(30), 550);

        // نور روی پیام
        const msg = document.querySelector('.message');
        msg.style.boxShadow = '0 0 60px rgba(255,215,0,0.25)';
        msg.style.borderColor = '#ffd700';
        setTimeout(() => {
          msg.style.boxShadow = 'inset 0 0 40px rgba(255,215,0,0.02)';
          msg.style.borderColor = '#f39c12';
        }, 700);
      });

      // ============================================================
      // 4. مخفی کردن cursor بعد از 3 ثانیه
      // ============================================================
      setTimeout(() => {
        const cursor = document.querySelector('.cursor-blink');
        if (cursor) cursor.style.display = 'none';
      }, 3000);

      // ============================================================
      // 5. کانفتی اولیه هنگام لود
      // ============================================================
      window.addEventListener('load', function() {
        setTimeout(() => createConfetti(40), 500);
        setTimeout(() => createConfetti(30), 1200);
      });

      // ============================================================
      // 6. پارالاکس خفیف با موس (سبک)
      // ============================================================
      const card = document.querySelector('.card');
      let isHover = false;

      document.addEventListener('mousemove', function(e) {
        const x = (e.clientX / window.innerWidth - 0.5) * 6;
        const y = (e.clientY / window.innerHeight - 0.5) * 6;
        card.style.transition = 'transform 0.12s ease-out';
        card.style.transform = `translateY(-6px) perspective(600px) rotateY(${x * 0.5}deg) rotateX(${-y * 0.5}deg) scale(1.005)`;
      });

      document.addEventListener('mouseleave', function() {
        card.style.transition = 'transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)';
        card.style.transform = '';
      });

      // برای کاهش مصرف منابع، وقتی موس روی کارت نیست، افکت متوقف شود
      card.addEventListener('mouseenter', () => { isHover = true; });
      card.addEventListener('mouseleave', () => { isHover = false; });

      // ============================================================
      // 7. دکمه با نور شناور (اختیاری، سبک)
      // ============================================================
      btn.addEventListener('mousemove', function(e) {
        const rect = this.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        this.style.setProperty('--mx', x + '%');
        this.style.setProperty('--my', y + '%');
      });

    })();
  </script>

</body>
</html>
