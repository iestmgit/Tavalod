<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تولدت مبارک عمو هادی ❤️</title>
  <link href="https://fonts.googleapis.com/css2?family=Vazir+Matn:wght@300;700;900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Vazir Matn', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0f;
      overflow: hidden;
      padding: 20px;
      position: relative;
    }

    /* پس‌زمینهٔ گرادیان متحرک */
    .bg-glow {
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, #1a0e05, #0a0a0f 70%);
      z-index: 0;
      animation: bgPulse 12s ease-in-out infinite alternate;
    }
    @keyframes bgPulse {
      0% { transform: scale(1) rotate(0deg); }
      100% { transform: scale(1.1) rotate(3deg); }
    }

    /* ذرات درخشان (ستاره‌ها) با کد JS */

    /* کارت اصلی — شیشه‌ای با درخشش طلایی */
    .card {
      position: relative;
      z-index: 10;
      max-width: 780px;
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 80px 20px 80px 20px;
      padding: 44px 32px 52px;
      box-shadow: 0 50px 80px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 215, 0, 0.15);
      border: 1px solid rgba(255, 215, 0, 0.2);
      text-align: center;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.5s ease;
      animation: floatCard 6s ease-in-out infinite;
    }
    @keyframes floatCard {
      0%, 100% { transform: translateY(0px) rotate(0deg); }
      50% { transform: translateY(-14px) rotate(0.5deg); }
    }
    .card:hover {
      transform: translateY(-8px) scale(1.01);
      box-shadow: 0 60px 100px rgba(0, 0, 0, 0.9), 0 0 0 2px rgba(255, 215, 0, 0.4), 0 0 60px rgba(255, 200, 50, 0.2);
    }

    /* هالهٔ طلایی دور کارت */
    .card::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 82px 22px 82px 22px;
      background: linear-gradient(135deg, #f9d976, #f39c12, #f1c40f, #e67e22, #f9d976);
      background-size: 400% 400%;
      z-index: -1;
      filter: blur(12px);
      opacity: 0.6;
      animation: goldBorder 8s ease infinite;
    }
    @keyframes goldBorder {
      0% { background-position: 0% 50%; opacity: 0.5; }
      50% { background-position: 100% 50%; opacity: 0.9; }
      100% { background-position: 0% 50%; opacity: 0.5; }
    }

    /* عنوان */
    .greeting {
      font-size: 2.8rem;
      font-weight: 900;
      background: linear-gradient(135deg, #ffd700, #ffb347, #ff8c00, #ffd700);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: shimmerText 5s ease-in-out infinite;
      text-shadow: 0 0 40px rgba(255, 200, 0, 0.2);
      letter-spacing: 3px;
      margin-bottom: 6px;
    }
    @keyframes shimmerText {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* اسم عمو هادی با افکت موج */
    .name {
      font-size: 5rem;
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 20px #f1c40f, 0 0 50px #e67e22, 0 0 90px #f39c12;
      letter-spacing: 10px;
      margin: 8px 0 4px;
      animation: waveGlow 2.8s ease-in-out infinite alternate;
    }
    @keyframes waveGlow {
      0% { text-shadow: 0 0 10px #f1c40f, 0 0 30px #e67e22, 0 0 60px #f39c12; transform: scale(1); }
      100% { text-shadow: 0 0 30px #ffd700, 0 0 70px #ff8c00, 0 0 120px #ffa500; transform: scale(1.02); }
    }

    /* برچسب سن */
    .age-badge {
      display: inline-block;
      background: rgba(255, 215, 0, 0.12);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 215, 0, 0.4);
      padding: 6px 28px;
      border-radius: 60px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffeaa7;
      letter-spacing: 2px;
      box-shadow: 0 0 30px rgba(255, 200, 0, 0.1);
      margin: 12px 0 18px;
    }

    /* ایموجی‌های رقصان */
    .emoji-row {
      font-size: 3.4rem;
      letter-spacing: 18px;
      margin: 10px 0 20px;
      animation: danceEmoji 2.4s ease-in-out infinite;
    }
    @keyframes danceEmoji {
      0%, 100% { transform: rotate(-3deg) scale(1); }
      50% { transform: rotate(3deg) scale(1.15); }
    }

    /* پیام با افکت تایپ‌رایتر (با JS) */
    .message-wrapper {
      min-height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 12px 0 20px;
    }
    .message {
      font-size: 1.35rem;
      line-height: 2.2rem;
      color: #f0e6d3;
      font-weight: 300;
      background: rgba(0, 0, 0, 0.3);
      padding: 18px 24px;
      border-radius: 50px 10px 50px 10px;
      border-right: 4px solid #f1c40f;
      border-left: 4px solid #f39c12;
      backdrop-filter: blur(4px);
      box-shadow: inset 0 0 40px rgba(255, 215, 0, 0.03);
      width: 100%;
      text-align: center;
      direction: rtl;
    }
    .message .highlight {
      color: #ffd700;
      font-weight: 700;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }
    .cursor-blink {
      display: inline-block;
      width: 3px;
      height: 1.6rem;
      background: #ffd700;
      margin-right: 4px;
      vertical-align: middle;
      animation: blink 0.9s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* دکمهٔ هدیه */
    .btn-gift {
      display: inline-block;
      padding: 18px 55px;
      background: linear-gradient(145deg, #f1c40f, #e67e22);
      border: none;
      border-radius: 60px;
      color: #0b0e1a;
      font-size: 1.6rem;
      font-weight: 900;
      font-family: 'Vazir Matn', sans-serif;
      cursor: pointer;
      box-shadow: 0 12px 35px rgba(241, 196, 15, 0.4);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      letter-spacing: 2px;
      border: 1px solid rgba(255, 255, 255, 0.25);
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }
    .btn-gift::after {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
      transform: rotate(25deg);
    }
    .btn-gift:hover {
      transform: scale(1.08);
      box-shadow: 0 20px 60px #f39c12, 0 0 90px #f1c40f;
      background: linear-gradient(145deg, #ffe066, #f39c12);
      color: #000;
    }
    .btn-gift:hover::after {
      opacity: 1;
    }
    .btn-gift:active {
      transform: scale(0.94);
    }

    /* پانوشت */
    .footer-note {
      margin-top: 30px;
      color: rgba(255, 215, 0, 0.25);
      font-size: 0.85rem;
      letter-spacing: 3px;
      border-top: 1px solid rgba(255, 215, 0, 0.07);
      padding-top: 22px;
    }

    /* کانفتی‌ها */
    .confetti-piece {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0% {
        transform: translateY(-10vh) rotate(0deg) scale(0.8);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) rotate(720deg) scale(0.2);
        opacity: 0.2;
      }
    }

    /* ریسپانسیو */
    @media (max-width: 640px) {
      .card { padding: 30px 16px 40px; border-radius: 50px 10px 50px 10px; }
      .greeting { font-size: 2rem; }
      .name { font-size: 3.4rem; letter-spacing: 5px; }
      .message { font-size: 1.05rem; padding: 14px; }
      .btn-gift { font-size: 1.3rem; padding: 14px 30px; }
      .emoji-row { font-size: 2.6rem; letter-spacing: 12px; }
      .age-badge { font-size: 1rem; padding: 4px 20px; }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>
  <canvas id="starsCanvas"></canvas>

  <div class="card">
    <div class="greeting">🎂 تولدت مبارک 🎂</div>
    <div class="name">عمو هادی</div>
    <div class="age-badge">✨ امروز روز خاص توست ✨</div>
    <div class="emoji-row">🎁 🥳 🎈 🎉 🎊</div>

    <div class="message-wrapper">
      <div class="message" id="typewriter">
        <span class="highlight">❤️ عمو هادی عزیز ❤️</span><br />
        بهترین‌ها را برایت آرزو میکنم.<br />
        روزت پر از <span class="highlight">شادی، عشق و موفقیت</span> 🌟
        <span class="cursor-blink"></span>
      </div>
    </div>

    <button class="btn-gift" id="fireConfetti">🎁 هدیه‌ی مخصوص 🎁</button>

    <div class="footer-note">★ با عشق از طرف خانواده ★</div>
  </div>

  <script>
    (function() {
      // ====== 1. ستاره‌های پس‌زمینه (کانواس) ======
      const canvas = document.getElementById('starsCanvas');
      const ctx = canvas.getContext('2d');
      let w, h;
      let stars = [];

      function resizeCanvas() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
      }
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      class Star {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
          this.r = Math.random() * 2.2 + 0.6;
          this.dx = (Math.random() - 0.5) * 0.25;
          this.dy = (Math.random() - 0.5) * 0.25;
          this.alpha = Math.random() * 0.6 + 0.3;
          this.hue = 38 + Math.random() * 25;
        }
        update() {
          this.x += this.dx;
          this.y += this.dy;
          if (this.x < 0 || this.x > w) this.dx *= -1;
          if (this.y < 0 || this.y > h) this.dy *= -1;
        }
        draw() {
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
          ctx.fillStyle = `hsla(${this.hue}, 90%, 70%, ${this.alpha})`;
          ctx.shadowColor = '#ffd700';
          ctx.shadowBlur = 14;
          ctx.fill();
        }
      }

      for (let i = 0; i < 150; i++) stars.push(new Star());

      function animateStars() {
        ctx.clearRect(0, 0, w, h);
        stars.forEach(s => { s.update(); s.draw(); });
        requestAnimationFrame(animateStars);
      }
      animateStars();

      // ====== 2. افکت تایپ‌رایتر برای پیام ======
      const msgEl = document.getElementById('typewriter');
      // متن اصلی (با برچسب‌های HTML)
      const fullHTML = `<span class="highlight">❤️ عمو هادی عزیز ❤️</span><br />بهترین‌ها را برایت آرزو میکنم.<br />روزت پر از <span class="highlight">شادی، عشق و موفقیت</span> 🌟`;

      // برای سادگی، از innerHTML استفاده می‌کنیم و به صورت آنی نمایش می‌دهیم،
      // اما برای افکت تایپ، می‌توانیم حروف را یکی یکی نشان دهیم.
      // در اینجا یک افکت تایپ ملایم با setInterval انجام می‌دهیم (فقط برای حروف ساده)
      // اما چون HTML داریم، بهتر است یک پیام ساده‌تر را تایپ کنیم.
      // پیاده‌سازی ساده: کل متن را با یک افکت محو شدن نشان می‌دهیم.
      // اما برای زیبایی، یک افکت تایپ واقعی روی متن ساده (بدون تگ) انجام می‌دهیم.
      // بیایید یک نسخه‌ی ساده‌تر از پیام را تایپ کنیم.

      // ما از روشی استفاده می‌کنیم که پیام را به صورت متنی با تگ‌های span نمایش دهیم.
      // اما تایپ‌رایتر با HTML پیچیده است. بنابراین یک افکت محو شدن و ظاهر شدن تدریجی انجام می‌دهیم.
      // راه حل: پیام را با opacity و transition نشان می‌دهیم.

      // اما به جای تایپ‌رایتر، یک انیمیشن fade-in با تاخیر برای کلمات انجام می‌دهیم.
      // برای این کار، پیام را به چند بخش تقسیم می‌کنیم و با JS به ترتیب نشان می‌دهیم.

      // پیاده‌سازی سریع و زیبا: متن را به صورت کامل با یک افکت fade-in از پایین نشان می‌دهیم.
      // این کار ساده‌تر و روان‌تر است.
      // ما یک کلاس به پیام اضافه می‌کنیم که با تاخیر نمایش داده شود.
      // در واقع در CSS یک انیمیشن fadeInUp تعریف می‌کنیم.

      // برای این نسخه، از روش زیر استفاده می‌کنیم:
      // 1. ابتدا پیام مخفی است.
      // 2. بعد از 500ms نمایش داده می‌شود با انیمیشن.

      // در HTML، داخل .message محتوای کامل را قرار می‌دهیم ولی opacity=0 و transition داریم.
      // با JS بعد از لود، opacity را به 1 تغییر می‌دهیم.

      // اما برای اینکه کار خاصی انجام دهیم، یک تایپ‌رایتر ساده روی یک متن جایگزین پیاده‌سازی می‌کنیم.
      // بیایید یک پیام متنی ساده بدون تگ داشته باشیم و تایپ کنیم.
      // ولی کاربر می‌خواهد همان پیام زیبا با هایلایت باشد. بنابراین از یک روش ترکیبی استفاده می‌کنیم:
      // کل متن را با innerHTML تنظیم می‌کنیم ولی با opacity=0 شروع و بعد fade-in می‌کنیم.

      // این روش بسیار ساده و در عین حال زیباست.
      // ما قبلاً در HTML پیام کامل را قرار داده‌ایم. فقط opacity را با JS کنترل می‌کنیم.

      // در واقع ما در CSS یک کلاس .show به .message اضافه می‌کنیم که opacity=1 و transform: translateY(0)
      // و برای آن transition می‌دهیم.

      // برای اینکه کار حرفه‌ای‌تر شود، یک تایپ‌رایتر واقعی روی یک متن ساده پیاده‌سازی می‌کنیم.
      // اما اینجا فقط برای نمایش زیبایی، از fade-in استفاده می‌کنیم که بسیار روان است.

      // پیاده‌سازی نهایی: با استفاده از requestAnimationFrame و setInterval یک تایپ‌رایتر ساده
      // که فقط روی متن ساده (بدون تگ) کار می‌کند، اما ما می‌خواهیم تگ‌ها حفظ شوند.
      // بنابراین از یک روش هوشمندانه استفاده می‌کنیم: متن را به صورت آرایه‌ای از کاراکترها با تگ‌ها می‌شکنیم.
      // اما این پیچیده است. پس به جای آن، از یک افکت محو شدن تدریجی با تاخیر برای هر کلمه استفاده می‌کنیم.

      // بهترین راه: پیام را به سه بخش تقسیم می‌کنیم و هر بخش را با تاخیر نشان می‌دهیم.
      // اما برای سادگی و زیبایی، یک افکت ماشین تحریر روی کل متن (با حفظ تگ‌های HTML) انجام می‌دهیم.
      // این کار با innerHTML و setInterval ممکن است اما تگ‌ها به هم می‌ریزند.
      // بنابراین یک راه حل ساده: پیام را به صورت یک رشته با تگ‌ها نگه می‌داریم و با استفاده از
      // insertAdjacentHTML و or innerHTML به تدریج کاراکترها را اضافه می‌کنیم، اما تگ‌ها را کامل نگه می‌داریم.
      // یعنی به جای کاراکتر به کاراکتر، کلمه به کلمه یا بخش به بخش اضافه کنیم.

      // من یک راه حل بسیار زیبا و ساده ارائه می‌دهم: 
      // پیام را به سه خط تقسیم می‌کنیم و هر خط را با تاخیر 400ms نمایش می‌دهیم با انیمیشن fadeInUp.
      // این کار بسیار روان و زیباست.

      // بنابراین، تغییرات:
      // - در HTML، سه div جداگانه برای هر خط قرار می‌دهیم.
      // - با JS به ترتیب کلاس 'show' به آنها اضافه می‌کنیم.

      // اما برای اینکه کد ساده بماند، من از روشی استفاده می‌کنم که در آن کل پیام به صورت
      // یکجا با opacity=0 شروع و بعد از 500ms با transition به opacity=1 می‌رسد.
      // همچنین یک افکت slide-up هم دارد.

      // این کار را با اضافه کردن کلاس به .message انجام می‌دهیم.

      // برای پیاده‌سازی، در CSS یک کلاس .typed اضافه می‌کنیم که opacity و transform را تغییر دهد.

      // اما در حال حاضر، من از روش زیر استفاده می‌کنم که بسیار ساده و موثر است:
      // بعد از لود صفحه، یک کلاس به .message اضافه می‌کنیم که انیمیشن fadeInUp را فعال کند.

      // برای این کار، در CSS یک انیمیشن تعریف می‌کنیم و با JS کلاس را اضافه می‌کنیم.
      // به خاطر داشته باشید که ما نمی‌خواهیم پیچیده شود.

      // در نهایت، من از یک تایپ‌رایتر واقعی با استفاده از کتابخانه‌های خارجی صرف نظر می‌کنم
      // و از یک انیمیشن fade-in با تاخیر استفاده می‌کنم که بسیار زیبا و روان است.

      // پیاده‌سازی نهایی:
      // ما یک کلاس .show به .message اضافه می‌کنیم که opacity=1 و transform: translateY(0) دارد.
      // و transition تعریف می‌کنیم.

      // بنابراین در CSS:
      // .message { opacity: 0; transform: translateY(20px); transition: all 1s ease; }
      // .message.show { opacity: 1; transform: translateY(0); }

      // و در JS:
      // setTimeout(() => { document.querySelector('.message').classList.add('show'); }, 400);

      // عالی! این کار را انجام می‌دهیم.

      // ====== 3. کانفتی ======
      function createConfetti(count = 100) {
        const colors = ['#ffd700', '#ff6b6b', '#4ecdc4', '#ffe66d', '#ff9ff3', '#f368e0', '#ff9f43', '#00d2d3', '#1dd1a1', '#feca57', '#a29bfe', '#fd79a8'];
        for (let i = 0; i < count; i++) {
          const el = document.createElement('div');
          el.className = 'confetti-piece';
          const size = Math.random() * 16 + 6;
          const color = colors[Math.floor(Math.random() * colors.length)];
          const left = Math.random() * 100;
          const duration = Math.random() * 2 + 2.5;
          const delay = Math.random() * 1.2;
          const rotate = Math.random() * 360;
          const shape = Math.random() > 0.5 ? '50%' : '2px';

          el.style.width = size + 'px';
          el.style.height = size * (0.5 + Math.random() * 0.6) + 'px';
          el.style.background = color;
          el.style.left = left + '%';
          el.style.top = '-10px';
          el.style.borderRadius = shape;
          el.style.animationDuration = duration + 's';
          el.style.animationDelay = delay + 's';
          el.style.transform = `rotate(${rotate}deg)`;
          el.style.boxShadow = `0 0 15px ${color}`;

          document.body.appendChild(el);
          setTimeout(() => { if (el.parentNode) el.remove(); }, (duration + delay) * 1000 + 300);
        }
      }

      // ====== 4. رویدادها ======
      const btn = document.getElementById('fireConfetti');

      // نمایش پیام با افکت fade-in
      const msg = document.querySelector('.message');
      setTimeout(() => {
        msg.classList.add('show');
      }, 300);

      // کلیک دکمه
      btn.addEventListener('click', function(e) {
        this.style.transform = 'scale(0.92)';
        setTimeout(() => { this.style.transform = ''; }, 200);

        createConfetti(130);
        setTimeout(() => createConfetti(70), 300);
        setTimeout(() => createConfetti(50), 700);

        // جلوه‌ی نور روی پیام
        msg.style.transition = 'box-shadow 0.3s, border-color 0.3s';
        msg.style.boxShadow = '0 0 60px rgba(255,215,0,0.4)';
        msg.style.borderColor = '#ffd700';
        setTimeout(() => {
          msg.style.boxShadow = 'inset 0 0 40px rgba(255,215,0,0.03)';
          msg.style.borderColor = '#f39c12';
        }, 700);
      });

      // کانفتی اولیه هنگام لود
      window.addEventListener('load', function() {
        setTimeout(() => createConfetti(50), 600);
        setTimeout(() => createConfetti(30), 1300);
      });

      // پارالاکس خفیف با حرکت موس (اختیاری)
      document.addEventListener('mousemove', function(e) {
        const x = (e.clientX / window.innerWidth - 0.5) * 6;
        const y = (e.clientY / window.innerHeight - 0.5) * 6;
        const card = document.querySelector('.card');
        card.style.transform = `translateY(-8px) rotate(${x * 0.3}deg) skewX(${x * 0.1}deg)`;
        // reset after a while? بهتر است یک افکت ملایم داشته باشد.
        // اما برای اینکه تداخل با floatCard نداشته باشد، از transition استفاده می‌کنیم.
        card.style.transition = 'transform 0.15s ease-out';
      });

      // وقتی موس خارج می‌شود، به حالت عادی برگردد
      document.addEventListener('mouseleave', function() {
        const card = document.querySelector('.card');
        card.style.transform = '';
        card.style.transition = 'transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)';
      });

    })();
  </script>

  <!-- اضافه کردن کلاس show به پیام در CSS تعریف شده -->
  <style>
    /* پیام با افکت fade-in */
    .message {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1.2s cubic-bezier(0.23, 1, 0.32, 1), transform 1.2s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .message.show {
      opacity: 1;
      transform: translateY(0);
    }
    /* ریسپانسیو دکمه */
    .btn-gift {
      user-select: none;
    }
  </style>

</body>
</html>
